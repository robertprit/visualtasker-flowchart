<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">visualtasker-flowchart branch demo</title><desc id="desc">A decision node branches to true and false actions and joins at an exit.</desc>
  <rect width="900" height="420" fill="#f8f9ff"/><text x="30" y="42" font-family="sans-serif" font-size="24" fill="#252b36">Standalone Flowchart Demo — Branch fixture</text>
  <g fill="none" stroke="#596173" stroke-width="3"><path d="M450 125V165H270V205"/><path d="M450 125V165H630V205"/><path d="M270 275V315H450V345"/><path d="M630 275V315H450V345"/></g>
  <g font-family="sans-serif" text-anchor="middle"><rect x="355" y="65" width="190" height="60" rx="14" fill="white" stroke="#0057d9" stroke-width="3"/><text x="450" y="101" font-size="18">Decision</text><rect x="180" y="205" width="180" height="70" rx="14" fill="white" stroke="#3f4758" stroke-width="3"/><text x="270" y="246" font-size="18">True branch</text><rect x="540" y="205" width="180" height="70" rx="14" fill="white" stroke="#3f4758" stroke-width="3"/><text x="630" y="246" font-size="18">False branch</text><rect x="355" y="345" width="190" height="60" rx="14" fill="white" stroke="#006c45" stroke-width="4"/><text x="450" y="381" font-size="18">Join / Exit</text><text x="325" y="156" font-size="14" fill="#252b36">TRUE</text><text x="575" y="156" font-size="14" fill="#252b36">FALSE</text></g>
</svg>
